<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#87CEEB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Meu Clima Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --sky-color: #87CEEB;
            --text-primary: #202124;
            --active-border: #1a73e8;
        }
        
        html, body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom, var(--sky-color) 0%, #ffffff 100%) no-repeat fixed;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .container { 
            padding: 20px; 
            padding-top: 10px;
            box-sizing: border-box; 
            width: 100%; 
        }

        /* INSTRUÇÃO SUPERIOR */
        .instrucao {
            font-size: 0.85rem;
            color: #444;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 500;
        }

        /* BUSCA COMPACTA */
        .search-box {
            display: flex; gap: 8px; margin-bottom: 15px; width: 100%;
        }
        input {
            flex: 1; min-width: 0; padding: 12px 18px;
            border-radius: 25px; border: 1px solid rgba(0,0,0,0.15);
            background: white; color: black; outline: none; font-size: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* DASHBOARD DE CIDADES */
        .city-list {
            display: flex; flex-direction: column; gap: 10px;
            padding-bottom: 30px;
        }
        .city-card {
            background: rgba(255,255,255,0.6);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
        }
        .city-card.active {
            border-color: var(--active-border);
            background: rgba(255,255,255,0.9);
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .city-info h3 { margin: 0; font-size: 1.1rem; }
        .city-info p { margin: 2px 0 0; font-size: 0.8rem; color: #5f6368; text-transform: capitalize; }
        
        .city-temp { text-align: right; }
        .main-t { font-size: 1.8rem; font-weight: bold; display: block; line-height: 1; }
        .extra-t { font-size: 0.7rem; color: #5f6368; margin-top: 4px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="instrucao">Clique em uma cidade para alterar</div>
    
    <div class="search-box">
        <input type="search" id="cityInput" placeholder="Digite o nome da nova cidade..." 
               onkeypress="if(event.key === 'Enter') updateCity()">
    </div>

    <div class="city-list" id="dashboard">
        </div>
</div>

<script>
    const API_KEY = '1213db21e3a1749eda12fd9ff6c20524';
    let myCities = JSON.parse(localStorage.getItem('myCities')) || 
                   ['Ipatinga', 'Santana do Paraíso', 'Coronel Fabriciano', 'Timóteo', 'Belo Horizonte'];
    let selectedIndex = 0;

    async function fetchAllData() {
        const dashboard = document.getElementById('dashboard');
        dashboard.innerHTML = '';

        for (let i = 0; i < myCities.length; i++) {
            const city = myCities[i];
            const card = document.createElement('div');
            card.className = `city-card ${i === selectedIndex ? 'active' : ''}`;
            card.onclick = () => { selectedIndex = i; fetchAllData(); };

            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&lang=pt_br&appid=${API_KEY}`);
                const data = await res.json();

                if(data.cod === 200) {
                    card.innerHTML = `
                        <div class="city-info">
                            <h3>${data.name}</h3>
                            <p>${data.weather[0].description}</p>
                        </div>
                        <div class="city-temp">
                            <span class="main-t">${Math.round(data.main.temp)}°</span>
                            <span class="extra-t">Sens: ${Math.round(data.main.feels_like)}° | Umid: ${data.main.humidity}%</span>
                        </div>
                    `;
                } else {
                    card.innerHTML = `<div style="padding:10px">Cidade "${city}" não encontrada</div>`;
                }
            } catch (e) {
                card.innerHTML = `<div style="padding:10px">Erro de conexão</div>`;
            }
            dashboard.appendChild(card);
        }
    }

    function updateCity() {
        const input = document.getElementById('cityInput');
        const newCity = input.value.trim();
        if(newCity) {
            myCities[selectedIndex] = newCity;
            localStorage.setItem('myCities', JSON.stringify(myCities));
            input.value = '';
            // Tira o foco do teclado após o enter
            input.blur();
            fetchAllData();
        }
    }

    fetchAllData();
    setInterval(fetchAllData, 300000); // 5 min
</script>

</body>
</html>
