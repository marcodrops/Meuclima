<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Clima Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
    <style>
        :root {
            --sky-color: #87CEEB;
            --text-color: #3c4043;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom, var(--sky-color), #ffffff);
            min-height: 100vh;
            color: var(--text-color);
            overflow-x: hidden; /* Impede a página de balançar para os lados */
        }
        .container { 
            padding: 15px; 
            max-width: 100vw; 
            box-sizing: border-box;
        }
        
        /* Barra de Pesquisa Ajustada */
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            width: 100%;
        }
        input {
            flex: 1; /* Ocupa o espaço que sobra, mas respeita o botão */
            min-width: 0; /* Importante para não empurrar o flexbox */
            padding: 12px 15px;
            border-radius: 25px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.9);
            outline: none;
            font-size: 1rem;
        }
        button {
            padding: 12px;
            min-width: 50px; /* Garante que a lupa tenha um tamanho fixo */
            border-radius: 25px;
            border: none;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .city-name { font-size: 1.6rem; font-weight: 500; }
        .temp-main { font-size: 4.5rem; font-weight: 300; margin: 5px 0; }
        
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
            background: rgba(255,255,255,0.4);
            padding: 15px;
            border-radius: 20px;
        }
        .detail-item { font-size: 0.85rem; color: #5f6368; }
        .detail-item b { color: #202124; display: block; font-size: 1rem; }

        .frog-area { text-align: center; margin: 20px 0; }
        .sun-img { width: 90px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }

        .footer-card {
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            margin-top: auto;
        }
    </style>

    </style>
</head>
<body>

<div class="container">
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Pesquisar cidade...">
        <button onclick="searchCity()">🔍</button>
    </div>

    <div id="climaApp">
        <div class="city-name" id="nomeCidade">Ipatinga</div>
        <div id="descricao">Carregando...</div>
        <div class="temp-main" id="tempAtual">--°</div>

        <div class="details-grid">
            <div class="detail-item">Sensação <b><span id="sensacao">--°</span></b></div>
            <div class="detail-item">Umidade <b><span id="umidade">--%</span></b></div>
            <div class="detail-item">Mínima <b><span id="tempMin">--°</span></b></div>
            <div class="detail-item">Máxima <b><span id="tempMax">--°</span></b></div>
        </div>
    </div>
</div>

<div class="frog-area">
    <img src="https://www.gstatic.com/images/branding/product/2x/weather_64dp.png" class="sun-img">
</div>

<div class="footer-card">
    <div id="infoExtra">Ideal para o conforto térmico do seu LG Inverter.</div>
</div>

<script>
    const API_KEY = '1213db21e3a1749eda12fd9ff6c20524'; // Sua chave com aspas

    async function getWeatherData(cidade = 'Ipatinga,BR') {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cidade}&units=metric&lang=pt_br&appid=${API_KEY}`);
            const data = await res.json();

            if(data.cod === "404") { alert("Cidade não encontrada!"); return; }

            document.getElementById('nomeCidade').innerText = data.name;
            document.getElementById('tempAtual').innerText = Math.round(data.main.temp) + '°';
            document.getElementById('descricao').innerText = data.weather[0].description;
            document.getElementById('sensacao').innerText = Math.round(data.main.feels_like) + '°';
            document.getElementById('umidade').innerText = data.main.humidity + '%';
            document.getElementById('tempMin').innerText = Math.round(data.main.temp_min) + '°';
            document.getElementById('tempMax').innerText = Math.round(data.main.temp_max) + '°';

            // Dica de eficiência baseada na umidade
            let dica = "Umidade em " + data.main.humidity + "%. ";
            if(data.main.humidity > 70) dica += "Modo 'Dry' no ar-condicionado é uma boa.";
            else dica += "Clima bom para os Coleiros.";
            document.getElementById('infoExtra').innerText = dica;

        } catch (err) {
            console.error(err);
        }
    }

    function searchCity() {
        const city = document.getElementById('cityInput').value;
        if(city) getWeatherData(city);
    }

    // Inicia com Ipatinga
    getWeatherData();
</script>
</body>
</html>
