<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Clima</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --sky-color: #87CEEB; /* Azul claro padrão */
            --text-color: #3c4043;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom, var(--sky-color), #ffffff);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-color);
            transition: background 1s ease;
        }
        .container {
            padding: 30px;
            flex: 1;
        }
        .city { font-size: 1.4rem; font-weight: 500; margin-bottom: 5px; }
        .temp-row { display: flex; align-items: baseline; gap: 10px; }
        .current-temp { font-size: 5rem; font-weight: 300; margin: 0; }
        .details { font-size: 1rem; color: #5f6368; }

        /* Área do Sapinho */
        .frog-area {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .frog-img {
            max-width: 80%;
            max-height: 250px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        /* Rodapé com Previsão (Estilo Google Antigo) */
        .footer-card {
            background: white;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 25px;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05);
        }
        .forecast-label { font-weight: bold; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="city" id="nomeCidade">Ipatinga</div>
        <div class="details" id="descricao">Carregando clima...</div>
        <div class="temp-row">
            <h1 class="current-temp" id="tempAtual">--°</h1>
        </div>
    </div>

    <div class="frog-area">
        <div class="frog-area">
    <img src="https://www.gstatic.com/images/branding/product/2x/weather_64dp.png" alt="Sapinho do Clima" class="frog-img">
</div>

    </div>

    <div class="footer-card">
        <span class="forecast-label">Hoje em Ipatinga</span>
        <div id="infoExtra" style="font-size: 0.9rem; color: #70757a;">
            Um dia perfeito para observar os Coleiros na região.
        </div>
    </div>

    <script>
        const API_KEY = '1213db21e3a1749eda12fd9ff6c20524';
        const CITY = 'Ipatinga,BR';

        async function getWeatherData() {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&units=metric&lang=pt_br&appid=${API_KEY}`);
                const data = await response.json();

                document.getElementById('tempAtual').innerText = Math.round(data.main.temp) + '°';
                document.getElementById('descricao').innerText = data.weather[0].description.charAt(0).toUpperCase() + data.weather[0].description.slice(1);
                
                // Lógica simples de cor de fundo
                const mainWeather = data.weather[0].main.toLowerCase();
                if(mainWeather.includes('rain')) {
                    document.documentElement.style.setProperty('--sky-color', '#4a69bd');
                } else if (mainWeather.includes('cloud')) {
                    document.documentElement.style.setProperty('--sky-color', '#a5b1c2');
                }

            } catch (err) {
                document.getElementById('descricao').innerText = "Erro ao carregar dados.";
            }
        }

        if(API_KEY !== 'SUA_CHAVE_AQUI') {
            getWeatherData();
        } else {
            document.getElementById('descricao').innerText = "Insira sua API Key no código.";
        }
    </script>
</body>
</html>
