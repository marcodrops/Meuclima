<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Clima</title>
    <link rel="manifest" href="manifest.json">
    <style>
    <style>
        :root {
            --sky-color: #87CEEB; /* Azul do céu */
            --text-color: #3c4043;
        }
        
        /* Garante que o fundo ocupe a tela toda sem falhas */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            /* O gradiente agora fica fixo no fundo */
            background: linear-gradient(to bottom, var(--sky-color) 0%, #ffffff 100%) no-repeat fixed;
            background-size: cover;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
        }

        .container { 
            padding: 20px; 
            flex: 1; /* Faz o conteúdo principal "empurrar" o rodapé */
            box-sizing: border-box;
        }
        
        /* Barra de Pesquisa Compacta */
        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            width: 100%;
        }
        input {
            flex: 1;
            min-width: 0;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.8);
            outline: none;
            font-size: 1rem;
        }
        button {
            padding: 12px;
            min-width: 50px;
            border-radius: 25px;
            border: none;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .city-name { font-size: 1.8rem; font-weight: 500; }
        .temp-main { font-size: 5rem; font-weight: 300; margin: 10px 0; }
        
        /* Grade de Detalhes */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            background: rgba(255,255,255,0.4);
            padding: 18px;
            border-radius: 25px;
            backdrop-filter: blur(5px); /* Efeito de vidro fosco */
        }
        .detail-item { font-size: 0.9rem; color: #5f6368; }
        .detail-item b { color: #202124; display: block; font-size: 1.1rem; margin-top: 4px; }

        .frog-area { text-align: center; padding: 30px 0; }
        .sun-img { width: 100px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.15)); }

        /* Rodapé Branco que fecha o visual */
        .footer-card {
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 25px 20px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            text-align: center;
            font-size: 0.95rem;
        }
    </style>

    </style>
</head>
<body>

    <div class="container">
        <div class="city" id="nomeCidade">Ipatinga</div>
        <div class="details" id="descricao">Carregando clima...</div>
        <div class="temp-row">
            <h1 class="current-temp" id="tempAtual">--°</h1>
        </div>
    </div>

    <div class="frog-area">
        <div class="frog-area">
    <img src="https://www.gstatic.com/images/branding/product/2x/weather_64dp.png" alt="Sapinho do Clima" class="frog-img">
</div>

    </div>

    <div class="footer-card">
        <span class="forecast-label">Hoje em Ipatinga</span>
        <div id="infoExtra" style="font-size: 0.9rem; color: #70757a;">
            Um dia perfeito para observar os Coleiros na região.
        </div>
    </div>

    <script>
        const API_KEY = '1213db21e3a1749eda12fd9ff6c20524';
        const CITY = 'Ipatinga,BR';

        async function getWeatherData() {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&units=metric&lang=pt_br&appid=${API_KEY}`);
                const data = await response.json();

                document.getElementById('tempAtual').innerText = Math.round(data.main.temp) + '°';
                document.getElementById('descricao').innerText = data.weather[0].description.charAt(0).toUpperCase() + data.weather[0].description.slice(1);
                
                // Lógica simples de cor de fundo
                const mainWeather = data.weather[0].main.toLowerCase();
                if(mainWeather.includes('rain')) {
                    document.documentElement.style.setProperty('--sky-color', '#4a69bd');
                } else if (mainWeather.includes('cloud')) {
                    document.documentElement.style.setProperty('--sky-color', '#a5b1c2');
                }

            } catch (err) {
                document.getElementById('descricao').innerText = "Erro ao carregar dados.";
            }
        }

        if(API_KEY !== 'SUA_CHAVE_AQUI') {
            getWeatherData();
        } else {
            document.getElementById('descricao').innerText = "Insira sua API Key no código.";
        }
    </script>
</body>
</html>
